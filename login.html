<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to your Chafiktech Ai account. Access powerful AI tools for content creation, video prompts, and social media optimization.">
    <meta name="keywords" content="Chafiktech Ai login, AI tools sign in, content creation platform, AI dashboard access">
    <meta name="robots" content="noindex, nofollow">
    <meta name="author" content="Chafiktech Ai">
    <meta property="og:title" content="Sign In — Chafiktech Ai">
    <meta property="og:description" content="Sign in to your Chafiktech Ai account and access next-generation AI tools for creators.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://Chafiktech Ai.com/login">
    <title>Sign In — Chafiktech Ai</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Auth Page -->
    <section class="auth-page bg-mesh bg-grid">

        <!-- Floating Orbs -->
        <div class="floating-orb floating-orb-1"></div>
        <div class="floating-orb floating-orb-2"></div>
        <div class="floating-orb floating-orb-3"></div>

        <!-- Auth Card -->
        <div class="auth-card">

            <!-- Logo -->
            <a href="index.html" class="nav-logo" style="justify-content: center; margin-bottom: 1.5rem; text-decoration: none;">
                <div class="nav-logo-icon">⚡</div>
                Chafiktech Ai
            </a>

            <!-- Header -->
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Sign in to your account</p>
            </div>

            <!-- Login Form -->
            <form class="auth-form" id="loginForm">

                <!-- Email -->
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter your password" required autocomplete="current-password">
                </div>

                <!-- Error Message -->
                <div id="loginError" style="color: #ef4444; font-size: 0.85rem; margin-bottom: 1rem; display: none;"></div>

                <!-- Submit Button -->
                <button type="submit" id="loginBtn" class="btn btn-primary" style="width: 100%;">Sign In</button>

            </form>

            <!-- Divider -->
            <div class="form-divider">
                <span>or continue with</span>
            </div>

            <!-- Social Login -->
            <div class="social-login">
                <button class="btn btn-social" type="button">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Google
                </button>
                <button class="btn btn-social" type="button">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
                    </svg>
                    GitHub
                </button>
            </div>

            <!-- Footer -->
            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html">Sign up</a></p>
            </div>

        </div>

    </section>

    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const btn = document.getElementById('loginBtn');
        const err = document.getElementById('loginError');

        btn.disabled = true;
        btn.textContent = 'Signing in...';
        err.style.display = 'none';

        try {
          const res = await Auth.login(email, pass);
          if (res.success) {
            window.location.href = 'dashboard/dashboard.html';
          } else {
            err.textContent = res.message || 'Login failed';
            err.style.display = 'block';
          }
        } catch (error) {
          err.textContent = 'Network error. Please try again.';
          err.style.display = 'block';
        } finally {
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      });
    </script>
  <!-- Global Floating Sidebar -->
  <div class="global-floating-sidebar">
    <div class="gfs-toggle">
      <span>🧰</span>
      <span class="gfs-text">Quick Tools</span>
    </div>
    <a href="tools/seo-article-generator.html" class="gfs-link">
      <span>📝</span><span class="gfs-text">SEO Generator</span>
    </a>
    <a href="tools/tiktok-tools.html" class="gfs-link">
      <span>🎵</span><span class="gfs-text">TikTok Suite</span>
    </a>
    <a href="tools/youtube-suite.html" class="gfs-link">
      <span>📺</span><span class="gfs-text">YouTube Suite</span>
    </a>
    <a href="ecommerce.html" class="gfs-link">
      <span>🛒</span><span class="gfs-text">Digital Product</span>
    </a>
  </div>
</body>
</html>
