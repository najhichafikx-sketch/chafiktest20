<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Chafiktech Ai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background-color: #030712;
      color: #f9fafb;
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .login-container {
      background: rgba(31, 41, 55, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      backdrop-filter: blur(10px);
      text-align: center;
    }
    .login-logo {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin: 0 auto 24px;
    }
    .form-group {
      margin-bottom: 24px;
      text-align: left;
    }
    .form-label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #d1d5db;
    }
    .form-input {
      width: 100%;
      background: #111827;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 12px 16px;
      color: white;
      font-family: inherit;
      box-sizing: border-box;
    }
    .form-input:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }
    .btn-main {
      background: #6366f1;
      color: white;
      border: none;
      padding: 12px;
      width: 100%;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 1rem;
    }
    .btn-main:hover {
      background: #818cf8;
    }
    .error-msg {
      color: #ef4444;
      margin-top: 16px;
      font-size: 0.9rem;
      display: none;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-logo">⚡</div>
    <h2 style="margin-top:0; margin-bottom: 8px;">Admin Access</h2>
    <p style="color: #9ca3af; margin-bottom: 32px; font-size: 0.9rem;">Please enter your master password to continue.</p>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Admin Password</label>
        <input type="password" id="password" class="form-input" required placeholder="Enter password...">
      </div>
      <button type="submit" class="btn-main" id="loginBtn">Login to Dashboard</button>
      <div class="error-msg" id="errorMsg">Invalid password</div>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMsg');
      
      btn.textContent = 'Verifying...';
      btn.disabled = true;
      errorMsg.style.display = 'none';

      try {
        const res = await fetch(window.location.origin + '/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        
        const data = await res.json();
        
        if (data.success) {
          localStorage.setItem('admin_token', data.token);
          window.location.href = 'admin.html';
        } else {
          errorMsg.textContent = data.message || 'Login failed';
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.textContent = 'Connection error. Make sure backend is running.';
        errorMsg.style.display = 'block';
      } finally {
        btn.textContent = 'Login to Dashboard';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
